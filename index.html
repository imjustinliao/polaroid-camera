<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a1510">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="An immersive Polaroid camera simulator. Point, shoot, and experience instant photography with authentic sounds and real-time photo development.">

  <!-- Open Graph / Link Preview -->
  <meta property="og:title" content="Polaroid Camera">
  <meta property="og:description" content="An immersive Polaroid camera simulator with authentic sounds, film styles, and instant photo development.">
  <meta property="og:image" content="https://imjustinliao.github.io/polaroid-camera/og-image.svg">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://imjustinliao.github.io/polaroid-camera/">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Polaroid Camera">
  <meta name="twitter:description" content="An immersive Polaroid camera simulator with authentic sounds and instant development.">
  <meta name="twitter:image" content="https://imjustinliao.github.io/polaroid-camera/og-image.svg">

  <title>Polaroid Camera</title>

  <!-- Favicon — matches the shutter button -->
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="favicon.svg">

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- SCENE: Power-On Startup -->
  <div id="scene-poweron">
    <div class="iris-overlay">
      <div class="startup-flicker"></div>
      <div class="boot-text">POLAROID</div>
    </div>
  </div>

  <!-- SCENE: Viewfinder (Fullscreen Camera) -->
  <div id="scene-viewfinder">
    <!-- Camera frame: centered square — all HUD is relative to this -->
    <div class="camera-frame">
      <!-- Clip container — clips video + overlays, HUD elements sit outside -->
      <div class="camera-clip">
        <video id="camera-feed" autoplay playsinline muted></video>
        <div class="vf-grain"></div>
        <div class="vf-scanlines"></div>
        <div class="vf-vignette"></div>
        <div class="vf-frame-guides"></div>
        <div class="vf-viewfinder-inner"></div>
        <div class="vf-breathing"></div>
      </div>

      <!-- HUD: Top Labels -->
      <div class="hud-top">
        <span class="hud-label film-counter">10</span>
        <span class="hud-label brand">POLAROID</span>
      </div>

      <!-- HUD: Bottom Controls -->
      <div class="hud-bottom">
        <div class="theme-picker-wrapper">
          <div id="style-picker" class="style-picker-strip"></div>
        </div>
        <button id="shutter-btn" class="shutter-button" aria-label="Take photo"></button>
      </div>

      <!-- Zoom ruler — right side of frame -->
      <div class="zoom-ruler" id="zoom-ruler">
        <div class="zoom-ruler-track">
          <div class="zoom-ruler-ticks" id="zoom-ticks"></div>
          <div class="zoom-ruler-indicator" id="zoom-indicator"></div>
        </div>
        <div class="zoom-level-label" id="zoom-label">1.0x</div>
      </div>

      <!-- Photo stack — bottom right of frame, no count badge (shown in top-left) -->
      <div id="photo-stack" class="photo-stack" aria-label="View gallery"></div>

      <!-- Toggle camera -->
      <button id="toggle-camera" class="toggle-camera-btn" aria-label="Toggle camera" title="Switch camera">&#x1F4F7;</button>

      <!-- Social links — bottom left -->
      <div class="cam-social">
        <a href="https://justinliao.me" target="_blank" rel="noopener" title="Website">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>
        </a>
        <a href="https://x.com/imjustinliao" target="_blank" rel="noopener" title="@imjustinliao">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
        </a>
      </div>
    </div>
  </div>

  <!-- SCENE: Flash -->
  <div id="scene-flash"></div>

  <!-- SCENE: Gallery Panel -->
  <div id="scene-gallery">
    <div class="gallery-header">
      <h2 class="gallery-title">Your Roll</h2>
      <button id="close-gallery-btn" class="close-gallery-btn" aria-label="Close gallery">&#x2715;</button>
    </div>
    <div id="gallery-grid" class="gallery-grid"></div>
    <!-- Export button above footer -->
    <div class="gallery-export-row">
      <button id="export-all-btn" class="export-all-btn">Export All</button>
    </div>
    <!-- Footer: contact left, copyright center -->
    <div class="gallery-footer">
      <div class="footer-contact">
        <span class="footer-contact-label">Contact</span>
        <a href="https://justinliao.me" target="_blank" rel="noopener" title="Website">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>
        </a>
        <a href="https://x.com/imjustinliao" target="_blank" rel="noopener" title="@imjustinliao">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
        </a>
      </div>
      <span class="footer-copyright">&copy; Justin Liao</span>
      <div class="footer-spacer"></div>
    </div>
  </div>

  <!-- Eject Stage (where polaroids animate before moving to gallery) -->
  <div id="eject-stage"></div>

  <!-- Permission Overlay -->
  <div id="permission-overlay" class="permission-overlay hidden">
    <div class="permission-dialog">
      <h2 id="permission-title">Camera Required</h2>
      <p id="permission-text">This Polaroid camera needs access to your device's camera to work.</p>
      <button id="allow-camera-btn" class="permission-btn">Allow Camera</button>
      <p id="permission-hint" class="permission-hint">You can change this in your browser settings at any time.</p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
