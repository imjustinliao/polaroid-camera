<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#1a1510"/>
  <rect x="0" y="0" width="1200" height="630" fill="url(#bg)" opacity="0.5"/>
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#2a2018"/>
      <stop offset="100%" stop-color="#0d0a07"/>
    </radialGradient>
    <radialGradient id="btn" cx="40%" cy="38%">
      <stop offset="0%" stop-color="#ff7b5c"/>
      <stop offset="70%" stop-color="#c84b31"/>
      <stop offset="100%" stop-color="#8b2e15"/>
    </radialGradient>
  </defs>

  <!-- Polaroid card -->
  <rect x="420" y="80" width="360" height="430" rx="6" fill="#f5f0e8" opacity="0.95"/>
  <rect x="440" y="100" width="320" height="320" rx="3" fill="#3a3530"/>

  <!-- Camera icon inside polaroid -->
  <circle cx="600" cy="260" r="50" fill="none" stroke="rgba(240,225,200,0.3)" stroke-width="2"/>
  <circle cx="600" cy="260" r="20" fill="none" stroke="rgba(240,225,200,0.2)" stroke-width="1.5"/>

  <!-- Shutter button below -->
  <circle cx="600" cy="570" r="28" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="3"/>
  <circle cx="600" cy="570" r="24" fill="url(#btn)"/>
  <circle cx="600" cy="570" r="18" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>

  <!-- Title text -->
  <text x="600" y="40" text-anchor="middle" font-family="'Courier New', monospace" font-size="28" font-weight="bold" fill="rgba(240,225,200,0.7)" letter-spacing="8">POLAROID</text>
</svg>
